<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100面サイコロ お題</title>
<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  min-height: 100vh;
  font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  background:
    radial-gradient(circle at top, #333 0%, #111 45%, #000 100%);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 850px;
  background: rgba(18,18,18,0.92);
  border: 1px solid #444;
  border-radius: 28px;
  padding: 28px;
  text-align: center;
  box-shadow: 0 0 35px rgba(255,255,255,0.08);
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(28px, 5vw, 48px);
  letter-spacing: 2px;
}
.sub {
  color: #bbb;
  margin-bottom: 25px;
}
.dice {
  width: 180px;
  height: 180px;
  margin: 0 auto 22px;
  border-radius: 50%;
  background: linear-gradient(145deg, #050505, #2b2b2b);
  border: 4px solid #777;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 72px;
  font-weight: bold;
  box-shadow:
    inset 0 0 25px rgba(255,255,255,0.08),
    0 0 25px rgba(255,255,255,0.16);
}
.rolling {
  animation: shake 0.55s ease;
}
@keyframes shake {
  0% { transform: rotate(0deg) scale(1); }
  20% { transform: rotate(12deg) scale(1.06); }
  40% { transform: rotate(-12deg) scale(1.06); }
  60% { transform: rotate(10deg) scale(1.04); }
  80% { transform: rotate(-8deg) scale(1.03); }
  100% { transform: rotate(0deg) scale(1); }
}
button {
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  background: #000;
  border: 2px solid #888;
  border-radius: 999px;
  padding: 15px 42px;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 0 18px rgba(255,255,255,0.08);
}
button:hover {
  background: #222;
  transform: translateY(-2px);
}
.topic-box {
  margin-top: 26px;
  background: #080808;
  border: 1px solid #555;
  border-radius: 20px;
  padding: 22px;
}
.label {
  color: #aaa;
  font-size: 16px;
  margin-bottom: 10px;
}
#topic {
  font-size: clamp(22px, 4vw, 34px);
  line-height: 1.55;
  font-weight: bold;
}
.history {
  margin-top: 22px;
  color: #aaa;
  font-size: 14px;
  line-height: 1.7;
}
@media (max-width: 500px) {
  .container {
    padding: 22px 16px;
  }
  .dice {
    width: 145px;
    height: 145px;
    font-size: 58px;
  }
  button {
    width: 100%;
  }
}
</style>
</head>
<body>
<div class="container">
  <h1>🎲 100面サイコロ</h1>
  <div class="sub">ボタンを押すと、数字とお題が出ます</div>

  <div id="dice" class="dice">?</div>
  <button onclick="rollDice()">サイコロを振る</button>

  <div class="topic-box">
    <div class="label">お題</div>
    <div id="topic">ここにお題が表示されます</div>
  </div>

  <div class="history" id="history">履歴：まだありません</div>
</div>

<script>

  "透明人間になれたら何をする？",

  "好きな家事、嫌いな家事は？",
  "次の自分の番まで、利き手を使ってはいけない。",
  "自分を動物に例えると何？",

  "学校に新しいルールを1つ作るなら？",
  "みんなにおすすめしたいものを1つ紹介！",
  "みんな負けずにクリア！"

let historyList = [];

function rollDice() {
  const dice = document.getElementById("dice");
  const topic = document.getElementById("topic");
  const history = document.getElementById("history");

  dice.classList.remove("rolling");
  void dice.offsetWidth;
  dice.classList.add("rolling");

  let count = 0;
  const timer = setInterval(() => {
    const temp = Math.floor(Math.random() * 100) + 1;
    dice.textContent = temp;
    count++;
    if (count >= 12) {
      clearInterval(timer);
      const num = Math.floor(Math.random() * 100) + 1;
      dice.textContent = num;
      topic.textContent = topics[num - 1];

      historyList.unshift(num + "番");
      if (historyList.length > 8) historyList.pop();
      history.textContent = "履歴：" + historyList.join(" / ");
    }
  }, 45);
}
<script>
</body>
</html>
